  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

800;font-size:24px;letter-spacing:-.02em;margin:0\">Clients &amp; finances<\u002Fh1>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:20px;max-width:820px\">\n        <div data-g=\"cli-fiche\" sc-camel-on-click=\"{{ actFiche }}\" style=\"background:#FBF8F1;border:1px solid #ECE3D2;border-radius:16px;padding:18px;cursor:pointer\">\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#B0704C\">Habituée · boutique<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:17px;margin-top:6px\">Marie L.<\u002Fdiv>\n          <div style=\"font-size:13px;color:#6B7469;margin-top:3px\">12 passages · dernière visite jeudi<\u002Fdiv>\n          <div style=\"display:inline-flex;align-items:center;gap:7px;margin-top:12px;background:#F3E4D6;border-radius:100px;padding:7px 13px;font-size:12px;color:#8A5537;font-weight:600\">Récompense : une verrine offerte au prochain passage<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-g=\"cli-facture\" style=\"background:#FBF8F1;border:1px solid #ECE3D2;border-radius:16px;padding:18px\">\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#B0704C\">Traiteur · mariage Salvagny<\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ECE3D2;font-size:13px;margin-top:8px\"><span style=\"color:#6B7469\">Commandé le<\u002Fspan><span style=\"font-family:'Spline Sans Mono',monospace\">12 juin<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ECE3D2;font-size:13px\"><span style=\"color:#6B7469\">Livré le<\u002Fspan><span style=\"font-family:'Spline Sans Mono',monospace\">5 juillet<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:8px 0;font-size:13px;align-items:center\"><span style=\"color:#6B7469\">Règlement<\u002Fspan><span style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:#FDF3D7;color:#8A6A1F;border-radius:100px;padding:4px 10px\">Dû · échéance 4 août<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- ============ ÉCRAN A : HUB GUIDE ============ -->\n  <sc-if value=\"{{ isHub }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed;inset:0;z-index:70;background:rgba(14,57,71,.55);display:grid;place-items:center;padding:16px;overflow:auto\">\n      <div style=\"width:min(560px,94vw);background:#F3ECDD;border-radius:22px;padding:26px 26px 22px;animation:fadeUp .5s ease both;max-height:92vh;overflow:auto\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px\">\n          <div>\n            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#B0704C\">Le guide de l'Atelier<\u002Fdiv>\n            <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.02em;margin:8px 0 0\">Apprivoisez votre Atelier,<br>un chapitre à la fois<\u002Fh2>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ fermerHub }}\" aria-label=\"Fermer\" style=\"width:36px;height:36px;border-radius:50%;border:1.5px solid #DACEB6;background:#FBF8F1;color:#0E3947;font-size:16px;cursor:pointer;flex:0 0 auto\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px\">\n          <div style=\"display:flex;justify-content:space-between;font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:#6B7469\"><span>{{ hubPct }} terminé<\u002Fspan><span>{{ hubFaits }} / 7 chapitres<\u002Fspan><\u002Fdiv>\n          <div style=\"height:8px;border-radius:100px;background:#E4DAC6;margin-top:7px;overflow:hidden\"><div style=\"{{ stBarre }}\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:18px\">\n          <sc-for list=\"{{ chapRows }}\" as=\"c\" hint-placeholder-count=\"7\">\n            <div style=\"display:flex;align-items:center;gap:12px;background:#FBF8F1;border:1px solid #ECE3D2;border-radius:14px;padding:12px 14px\">\n              <span style=\"{{ c.numStyle }}\">{{ c.num }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14.5px\">{{ c.titre }}<\u002Fdiv>\n                <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:#A9A088;margin-top:2px\">{{ c.duree }} · {{ c.etatLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button sc-camel-on-click=\"{{ c.demarrer }}\" style=\"height:34px;padding:0 15px;border-radius:100px;border:none;background:#0E3947;color:#F3ECDD;font-family:'Bricolage Grotesque',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;flex:0 0 auto\">{{ c.btn }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.08em;color:#A9A088;text-align:center;margin-top:14px\">Progression enregistrée sur cet appareil.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ ÉCRANS B1-B6 : spotlight ============ -->\n  <sc-if value=\"{{ isTour }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:66;pointer-events:none\">\n      <div style=\"{{ stSpot }}\"><\u002Fdiv>\n      <button sc-camel-on-click=\"{{ passer }}\" style=\"position:fixed;top:16px;right:16px;pointer-events:auto;height:34px;padding:0 15px;border-radius:100px;border:1px solid rgba(243,236,221,.45);background:rgba(14,57,71,.55);color:#F3ECDD;font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer\">Passer<\u002Fbutton>\n      <sc-if value=\"{{ notSuccess }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:fixed;bottom:22px;left:0;right:0;margin-inline:auto;width:min(440px,92vw);pointer-events:auto;background:#FBF8F1;border:1px solid #ECE3D2;border-radius:20px;padding:22px 24px;box-shadow:0 30px 60px -24px rgba(0,0,0,.55);animation:fadeUp .45s ease both\">\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#B0704C\">Chapitre {{ chapNum }} · étape {{ stepNum }} / {{ stepTot }}<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:21px;letter-spacing:-.02em;color:#0E3947;margin-top:7px\">{{ stepTitre }}<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.65;color:#3A4A44;margin:9px 0 0\">{{ stepTexte }}<\u002Fp>\n          <sc-if value=\"{{ stepHasNext }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;justify-content:flex-end;margin-top:16px\">\n              <button sc-camel-on-click=\"{{ suivant }}\" style=\"height:42px;padding:0 22px;border-radius:100px;border:none;background:#0E3947;color:#F3ECDD;font-family:'Bricolage Grotesque',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer\" style-hover=\"opacity:.9\">Suivant<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ stepIsAction }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:inline-flex;align-items:center;gap:8px;margin-top:14px;background:#F3E4D6;border-radius:100px;padding:8px 14px;font-family:'Spline Sans Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#8A5537\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:#B0342C\"><\u002Fspan>Cliquez sur la zone en surbrillance\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:fixed;bottom:22px;left:0;right:0;margin-inline:auto;width:min(440px,92vw);pointer-events:auto;background:#FBF8F1;border:1px solid #ECE3D2;border-radius:20px;padding:24px;box-shadow:0 30px 60px -24px rgba(0,0,0,.55);animation:fadeUp .35s ease both;text-align:center\">\n          <span style=\"display:inline-grid;place-items:center;width:54px;height:54px;border-radius:50%;background:#2E6B4A;animation:popIn .4s cubic-bezier(.34,1.4,.64,1) both\">\n            <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#F7F1E4\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:21px;letter-spacing:-.02em;margin-top:12px\">C'est fait.<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#5A6B62;margin:6px 0 0\">Chapitre {{ chapNum }} terminé. Vous pourrez le rejouer quand vous voulez.<\u002Fp>\n          <button sc-camel-on-click=\"{{ continuer }}\" style=\"margin-top:16px;height:42px;padding:0 24px;border-radius:100px;border:none;background:#0E3947;color:#F3ECDD;font-family:'Bricolage Grotesque',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer\">Continuer<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- toast d'entrée douce -->\n  <sc-if value=\"{{ isToast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:20px;left:0;right:0;margin-inline:auto;width:min(460px,92vw);z-index:60;background:#0E3947;color:#F3ECDD;border-radius:18px;padding:15px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 24px 48px -20px rgba(14,57,71,.6);animation:fadeUp .5s ease both\">\n      <p style=\"flex:1;min-width:180px;font-size:14px;margin:0\">Envie d'une visite guidée de votre Atelier ?<\u002Fp>\n      <div style=\"display:flex;gap:8px\">\n        <button sc-camel-on-click=\"{{ toastOui }}\" style=\"height:36px;padding:0 18px;border-radius:100px;border:none;background:#B0342C;color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;cursor:pointer\">Oui<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ toastPlusTard }}\" style=\"height:36px;padding:0 15px;border-radius:100px;border:1px solid rgba(243,236,221,.4);background:transparent;color:#F3ECDD;font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;cursor:pointer\">Plus tard<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- confettis clôture -->\n  <div style=\"position:fixed;inset:0;z-index:80;pointer-events:none;overflow:hidden\">{{ confetti }}<\u002Fdiv>\n\n  <!-- ============ B7 : CLÔTURE ============ -->\n  <sc-if value=\"{{ isRecap }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:70;background:rgba(14,57,71,.6);display:grid;place-items:center;padding:16px;overflow:auto\">\n      <div style=\"width:min(480px,94vw);background:#F3ECDD;border-radius:22px;padding:30px 28px;text-align:center;animation:fadeUp .5s ease both\">\n        <span style=\"display:inline-grid;place-items:center;width:88px;height:88px;border-radius:50%;background:#B0342C;color:#F7F1E4;box-shadow:inset 0 0 0 4px rgba(247,241,228,.35)\">\n          <svg width=\"40\" height=\"40\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#F7F1E4\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#B0704C;margin-top:16px\">Badge débloqué<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:27px;letter-spacing:-.02em;margin:8px 0 0\">Atelier apprivoisé<\u002Fh2>\n        <div style=\"display:flex;justify-content:center;gap:6px;margin-top:16px;flex-wrap:wrap\">\n          <sc-for list=\"{{ recapEtapes }}\" as=\"e\" hint-placeholder-count=\"7\">\n            <span style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.06em;background:#FBF8F1;border:1px solid #E4DAC6;border-radius:100px;padding:6px 11px;color:#3A4A44\">{{ e }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.65;color:#5A6B62;margin:16px 0 0\">Ce guide reste là. Rejouez n'importe quel chapitre quand vous voulez.<\u002Fp>\n        <button sc-camel-on-click=\"{{ finirRecap }}\" style=\"margin-top:20px;height:46px;padding:0 26px;border-radius:100px;border:none;background:#0E3947;color:#F3ECDD;font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;cursor:pointer\">Retour au guide<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  // === Interface unique de progression ===\n  // En production, CC branche loadProgress/saveProgress sur localStorage\n  // (clé suggérée 'alm_guide_progress'). Ne JAMAIS appeler localStorage\n  // ailleurs. États par chapitre : 'a_faire' | 'fait' | 'a_revoir'.\n  progressMem = {};\n  loadProgress() { return this.progressMem; }\n  saveProgress(chap, etat) { this.progressMem[chap] = etat; this.forceUpdate(); }\n\n  // Cibles spotlight — PARAMÉTRABLES (convention TOUR_TARGETS) : en prod,\n  // remplacer par les sélecteurs des vrais écrans Atelier.\n  // Chaque chapitre se termine par UNE micro-action réelle (step avec `action`) :\n  // le guide attend le clic du chef sur la cible, puis feedback \"C'est fait.\"\n  CHAPS = [\n    { titre: 'Bienvenue dans votre Atelier', duree: '2 min', screen: 'dash', steps: [\n      { sel: '[data-g=\"nav\"]', t: 'Bienvenue dans votre Atelier', x: 'Ici, vous voyez ce que le site ne montre pas : vos coûts, vos marges, vos clients. Tout se pilote depuis ce menu.' },\n      { sel: '[data-g=\"nav-activite\"]', t: 'Votre journée, de haut en bas', x: 'Commandes, ventes, production : les sections suivent l\\'ordre réel de votre journée de travail.' },\n      { sel: null, t: 'Explorez librement', x: 'Vous ne pouvez rien casser. Chaque écran se visite sans risque, et ce guide reste disponible à tout moment.' },\n      { sel: '[data-g=\"nav-cmd\"]', t: 'À vous de jouer', x: 'Cliquez sur Commandes du jour dans le menu pour y aller vous-même.', action: 'nav-cmd' },\n    ]},\n    { titre: 'La commande arrive', duree: '3 min', screen: 'cmd', steps: [\n      { sel: '[data-g=\"cmd-fondatrice\"]', t: 'Une commande vous attend', x: 'La voici : la toute première commande, passée pendant l\\'inauguration. Elle attend votre décision.' },\n      { sel: '[data-g=\"cmd-statut\"]', t: 'Le statut dit tout', x: 'Une commande web reste en attente de confirmation par l\\'atelier tant que vous n\\'avez pas décidé. Le client est prévenu par email.' },\n      { sel: '[data-g=\"cmd-confirmer\"]', t: 'À vous de jouer', x: 'Confirmez cette commande : elle passera en production.', action: 'confirmer' },\n    ]},\n    { titre: 'On produit', duree: '2 min', screen: 'prod', steps: [\n      { sel: '[data-g=\"prod-plan\"]', t: 'Votre plan du jour', x: 'Le plan de production regroupe tout ce qu\\'il y a à cuisiner, canal par canal. Rien à ressaisir.' },\n      { sel: '[data-g=\"prod-ligne\"]', t: 'À vous de jouer', x: 'Retrouvez la commande confirmée dans la liste et ouvrez-la.', action: 'prod-ligne' },\n    ]},\n    { titre: 'On vend', duree: '3 min', screen: 'saisie', steps: [\n      { sel: '[data-g=\"saisie-canaux\"]', t: 'On vend', x: 'Boutique ou camion : chaque vente saisie ici alimente vos chiffres, canal par canal.' },\n      { sel: '[data-g=\"saisie-fidelite\"]', t: 'La fidélité compte ici', x: 'Les passages boutique et camion comptent pour la fidélité. Le traiteur en est exclu.' },\n      { sel: '[data-g=\"saisie-express\"]', t: 'À vous de jouer', x: 'Saisissez votre première vente : appuyez sur Lasagnes, 6,50 €. Tout est prérempli.', action: 'vente' },\n    ]},\n    { titre: 'On comprend', duree: '3 min', screen: 'ana', steps: [\n      { sel: '[data-g=\"ana-ca\"]', t: 'On comprend', x: 'Votre chiffre d\\'affaires, par canal. Ce qui marche se voit tout de suite, sans tableur.' },\n      { sel: '[data-g=\"ana-marge\"]', t: 'Lire un chiffre pour décider', x: 'Une marge faible n\\'est pas une faute : c\\'est une décision à prendre. Ajuster le prix, la portion ou la place à la carte.' },\n      { sel: '[data-g=\"ana-ia\"]', t: 'L\\'IA, concrètement', x: 'Elle repère pour vous ce qui mérite un coup d\\'œil : un invendu qui revient, un plat qui décolle. Vous décidez, elle surveille.' },\n      { sel: '[data-g=\"ana-marge\"]', t: 'À vous de jouer', x: 'Retrouvez la marge du magret sauce miel et cliquez dessus.', action: 'marge' },\n    ]},\n    { titre: 'On fidélise et on facture', duree: '3 min', screen: 'cli', steps: [\n      { sel: '[data-g=\"cli-fiche\"]', t: 'On fidélise', x: 'Vos habitués et leur historique. Les récompenses restent non monétaires : un extra, une priorité, une attention.' },\n      { sel: '[data-g=\"cli-facture\"]', t: 'On facture', x: 'Un traiteur vit sur trois dates : commandé, livré, réglé. Le statut de paiement se suit ici, sans confusion avec la livraison.' },\n      { sel: '[data-g=\"cli-fiche\"]', t: 'À vous de jouer', x: 'Ouvrez la fiche de Marie L., votre habituée de démonstration.', action: 'fiche' },\n    ]},\n    { titre: 'Clôture', duree: '1 min', screen: null, steps: [] },\n  ];\n  // Mapping aide contextuelle \"?\" : écran du module -> chapitre à rejouer.\n  AIDE = { dash: 1, cmd: 2, prod: 3, saisie: 4, ana: 5, cli: 6 };\n\n  state = { view: 'hub', screen: 'dash', chap: 0, step: 0, spot: null, cmdOk: false, success: false, origin: 'hub', toast: false, confetti: false };\n\n  componentDidMount() {\n    this.onResize = () => { if (this.state.view === 'tour') this.measure(); };\n    window.addEventListener('resize', this.onResize);\n  }\n  componentWillUnmount() { window.removeEventListener('resize', this.onResize); }\n\n  demarrer(n, origin) {\n    if (n === 7) { this.setState({ view: 'recap', origin: origin || 'hub' }); this.lancerConfettis(); return; }\n    const c = this.CHAPS[n - 1];\n    // Le chapitre 2 rejoue la commande fondatrice : on la remet \"en attente\"\n    // pour que la cible de l'action (bouton Confirmer) existe toujours.\n    this.setState({ view: 'tour', chap: n, step: 0, screen: c.screen, spot: null, success: false, origin: origin || 'hub', cmdOk: n === 2 ? false : this.state.cmdOk });\n    window.scrollTo(0, 0);\n    setTimeout(() => this.measure(), 80);\n  }\n  actHit(id) {\n    const s = this.state;\n    if (s.view !== 'tour' || s.success) return;\n    const st = this.CHAPS[s.chap - 1].steps[s.step];\n    if (st.action === id) this.setState({ success: true });\n  }\n  retour() {\n    // fin de chapitre : retour au hub, ou au module si lancé via l'icône \"?\"\n    this.setState(this.state.origin === 'module' ? { view: 'libre', chap: 0, spot: null, success: false } : { view: 'hub', chap: 0, spot: null, success: false });\n  }\n  lancerConfettis() {\n    this.setState({ confetti: true });\n    setTimeout(() => this.setState({ confetti: false }), 3200);\n  }\n  measure() {\n    const c = this.CHAPS[this.state.chap - 1]; if (!c) return;\n    const sel = c.steps[this.state.step].sel;\n    const full = { t: 10, l: 10, w: window.innerWidth - 20, h: window.innerHeight - 20 };\n    if (!sel) { this.setState({ spot: full }); return; }\n    const el = document.querySelector(sel);\n    if
